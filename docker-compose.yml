version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sgrades-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-sgrades}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # S-GRADES Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sgrades-app
    environment:
      # Database configuration
      DB_TYPE: ${DB_TYPE:-local-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-sgrades}

      # Application configuration
      ENVIRONMENT: ${ENVIRONMENT:-development}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

      # For SQLite fallback (if DB_TYPE=create-on-boot)
      DB_PATH: /app/data/sgrades.db
    volumes:
      # Mount data directory for SQLite (if needed)
      - app_data:/app/data
      # Mount frontend directory for development (optional)
      # - ./app/frontend:/app/app/frontend
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  app_data:
    driver: local