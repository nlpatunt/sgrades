components:
  schemas:
    Body_upload_results_api_outputs_submissions_upload_results_post:
      properties:
        model_description:
          anyOf:
          - type: string
          - type: 'null'
          title: Model Description
        model_name:
          title: Model Name
          type: string
        paper_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Paper Url
        results_files:
          items:
            format: binary
            type: string
          title: Results Files
          type: array
        submitter_email:
          title: Submitter Email
          type: string
        submitter_name:
          title: Submitter Name
          type: string
      required:
      - model_name
      - submitter_name
      - submitter_email
      - results_files
      title: Body_upload_results_api_outputs_submissions_upload_results_post
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  description: "\n    Benchmarking platform for automatic essay grading models. \n\
    \    \n    ## New Workflow:\n    1. **Download datasets** using `/datasets/download/all`\n\
    \    2. **Run your model** locally on all datasets\n    3. **Submit CSV results**\
    \ using `/outputs/upload-results`\n    4. **View leaderboard** with your model's\
    \ performance\n    \n    Submit your model results for evaluation across 12 curated\
    \ academic datasets.\n    "
  title: BESESR - Essay Grading Benchmarking Platform
  version: 1.0.0
openapi: 3.1.0
paths:
  /api-info:
    get:
      description: Information about the new API workflow
      operationId: api_info_api_info_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Api Info
  /api/datasets/:
    get:
      description: Get all available datasets from dynamic HuggingFace configuration
      operationId: get_all_datasets_api_datasets__get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Get All Datasets
      tags:
      - datasets
  /api/datasets/debug/inspect/{dataset_name}:
    get:
      description: Inspect actual dataset structure for column mapping
      operationId: inspect_dataset_structure_api_datasets_debug_inspect__dataset_name__get
      parameters:
      - in: path
        name: dataset_name
        required: true
        schema:
          title: Dataset Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Inspect Dataset Structure
      tags:
      - datasets
  /api/datasets/download/all:
    get:
      description: Download all datasets as a ZIP file for local evaluation
      operationId: download_all_datasets_api_datasets_download_all_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Download All Datasets
      tags:
      - datasets
  /api/datasets/download/{dataset_name}:
    get:
      description: Download a single dataset as CSV
      operationId: download_single_dataset_api_datasets_download__dataset_name__get
      parameters:
      - in: path
        name: dataset_name
        required: true
        schema:
          title: Dataset Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Download Single Dataset
      tags:
      - datasets
  /api/datasets/health/check:
    get:
      description: Check if dataset loading system is working
      operationId: dataset_health_check_api_datasets_health_check_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Dataset Health Check
      tags:
      - datasets
  /api/datasets/refresh-discovery:
    post:
      description: Refresh dynamic dataset discovery from HuggingFace
      operationId: refresh_dataset_discovery_api_datasets_refresh_discovery_post
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Refresh Dataset Discovery
      tags:
      - datasets
  /api/datasets/{dataset_name}:
    get:
      description: Get detailed information about a specific dataset
      operationId: get_dataset_details_api_datasets__dataset_name__get
      parameters:
      - in: path
        name: dataset_name
        required: true
        schema:
          title: Dataset Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Dataset Details
      tags:
      - datasets
  /api/datasets/{dataset_name}/sample:
    get:
      description: Get a sample of essays from the dataset
      operationId: get_dataset_sample_api_datasets__dataset_name__sample_get
      parameters:
      - in: path
        name: dataset_name
        required: true
        schema:
          title: Dataset Name
          type: string
      - in: query
        name: size
        required: false
        schema:
          default: 5
          title: Size
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Dataset Sample
      tags:
      - datasets
  /api/datasets/{dataset_name}/stats:
    get:
      description: Get statistics about a dataset
      operationId: get_dataset_statistics_api_datasets__dataset_name__stats_get
      parameters:
      - in: path
        name: dataset_name
        required: true
        schema:
          title: Dataset Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Dataset Statistics
      tags:
      - datasets
  /api/leaderboard/:
    get:
      description: Get leaderboard rankings from database
      operationId: get_leaderboard_api_leaderboard__get
      parameters:
      - in: query
        name: metric
        required: false
        schema:
          default: quadratic_weighted_kappa
          title: Metric
          type: string
      - in: query
        name: limit
        required: false
        schema:
          default: 20
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Leaderboard
      tags:
      - leaderboard
  /api/leaderboard/datasets/{dataset_name}:
    get:
      description: Get leaderboard for a specific dataset
      operationId: get_dataset_leaderboard_api_leaderboard_datasets__dataset_name__get
      parameters:
      - in: path
        name: dataset_name
        required: true
        schema:
          title: Dataset Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Dataset Leaderboard
      tags:
      - leaderboard
  /api/leaderboard/health:
    get:
      description: Health check for leaderboard service
      operationId: leaderboard_health_api_leaderboard_health_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Leaderboard Health
      tags:
      - leaderboard
  /api/leaderboard/metrics:
    get:
      description: Get list of available evaluation metrics
      operationId: get_available_metrics_api_leaderboard_metrics_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Get Available Metrics
      tags:
      - leaderboard
  /api/leaderboard/report:
    get:
      description: Get comprehensive benchmark report from database
      operationId: get_benchmark_report_api_leaderboard_report_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Get Benchmark Report
      tags:
      - leaderboard
  /api/leaderboard/stats:
    get:
      description: Get platform statistics from database
      operationId: get_leaderboard_stats_api_leaderboard_stats_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Get Leaderboard Stats
      tags:
      - leaderboard
  /api/outputs/submissions/template:
    get:
      description: Get template showing expected CSV format
      operationId: get_submission_template_api_outputs_submissions_template_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Get Submission Template
      tags:
      - submissions
  /api/outputs/submissions/upload-results:
    post:
      description: Upload CSV results from model evaluation on downloaded datasets
      operationId: upload_results_api_outputs_submissions_upload_results_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_results_api_outputs_submissions_upload_results_post'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Upload Results
      tags:
      - submissions
  /api/test-load/{dataset_name}:
    get:
      description: Test loading sample essays from Hugging Face dataset
      operationId: test_load_dataset_api_test_load__dataset_name__get
      parameters:
      - in: path
        name: dataset_name
        required: true
        schema:
          title: Dataset Name
          type: string
      - in: query
        name: sample_size
        required: false
        schema:
          default: 5
          title: Sample Size
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Test Load Dataset
  /debug/database:
    get:
      description: Debug endpoint to check database status
      operationId: debug_database_debug_database_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Debug Database
  /debug/datasets:
    get:
      description: Debug endpoint to check dataset loading
      operationId: debug_datasets_debug_datasets_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Debug Datasets
  /debug/reset-database:
    post:
      description: Reset database (development only)
      operationId: reset_database_debug_reset_database_post
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Reset Database
  /health:
    get:
      description: Health check endpoint with database and dataset status
      operationId: health_check_health_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Health Check
  /test-openrouter:
    get:
      description: Test OpenRouter connection (legacy)
      operationId: test_openrouter_test_openrouter_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
