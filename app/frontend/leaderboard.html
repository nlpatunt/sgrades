<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-GRADES Leaderboard</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="css/style.css">  
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <!-- Same header as your main page but with Leaderboard active -->
    <header style="background: white; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 1000;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; min-height: 60px;">
                <h1 style="font-size: 2.5rem; font-weight: 700; color: #2563eb; margin: 0;">
                    <a href="index.html" style="text-decoration: none; color: inherit;">S-GRADES</a>
                </h1>
                <nav style="display: flex; gap: 0.3rem; align-items: center;">
                    <a href="index.html#overview" style="padding: 0.5rem 0.6rem; font-size: 0.8rem; text-decoration: none; color: #111827; border-radius: 6px;">Overview</a>
                    <a href="index.html#datasets" style="padding: 0.5rem 0.6rem; font-size: 0.8rem; text-decoration: none; color: #111827; border-radius: 6px;">Datasets</a>
                    <a href="leaderboard.html" style="padding: 0.5rem 0.6rem; font-size: 0.8rem; text-decoration: none; color: #111827; border-radius: 6px; background: #e5e7eb;">Leaderboard</a>
                    <a href="index.html#submit" style="padding: 0.5rem 0.6rem; font-size: 0.8rem; text-decoration: none; color: #111827; border-radius: 6px;">Submit</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Leaderboard Section -->
    <section class="section">
        <div class="container">
            <div class="section-header">
                <h2>Complete Benchmark Leaderboard</h2>
                <p id="leaderboard-description">Rankings for researchers who submitted all 23 datasets</p>
            </div>

            <div class="leaderboard-controls">
                <div class="form-group">
                    <label for="metric-selector">Sort by Metric:</label>
                    <select id="metric-selector">
                        <option value="avg_quadratic_weighted_kappa">Average QWK</option>
                        <option value="avg_pearson_correlation">Average Pearson</option>
                        <option value="avg_f1_score">Average F1</option>
                        <option value="avg_precision">Average Precision</option>
                        <option value="avg_recall">Average Recall</option>
                        <option value="avg_accuracy">Average Accuracy</option>
                        <option value="avg_mean_absolute_error">Average MAE</option>
                    </select>
                </div>
                <button id="refresh-leaderboard" class="btn btn-outline">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>

            <div id="summary-stats" style="display:none; grid-template-columns: repeat(3,1fr); gap:1rem; margin-bottom:1.5rem;"></div>
            <div id="leaderboard-table">
                <div class="loading">Loading leaderboard...</div>
            </div>
        </div>
    </section>

   <script>
        let currentMetric = 'avg_quadratic_weighted_kappa';

        document.addEventListener('DOMContentLoaded', function() {
            loadLeaderboard();
            document.getElementById('metric-selector').addEventListener('change', function(e) {
                currentMetric = e.target.value;
                loadLeaderboard();
            });
            document.getElementById('refresh-leaderboard').addEventListener('click', loadLeaderboard);
        });

        async function loadLeaderboard() {
            const tableContainer = document.getElementById('leaderboard-table');
            tableContainer.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
            try {
                const response = await fetch('/api/submissions/leaderboard?complete_only=false&metric=' + currentMetric + '&limit=50');
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Failed');
                displayLeaderboard(data.rankings);
            } catch (error) {
                tableContainer.innerHTML = '<p style="color:red;padding:2rem;">Error: ' + error.message + '</p>';
            }
        }

        function fmt(v) { return (v === null || v === undefined) ? 'N/A' : Number(v).toFixed(3); }

        function displayLeaderboard(rankings) {
            const tableContainer = document.getElementById('leaderboard-table');
            if (!rankings || rankings.length === 0) {
                tableContainer.innerHTML = '<p style="padding:2rem;">No data found.</p>';
                return;
            }
            let html = '<div class="table-responsive"><table class="leaderboard-table"><thead><tr><th>Rank</th><th>Model Name</th><th>Datasets</th><th>Status</th><th>QWK</th><th>Pearson</th><th>F1</th><th>Precision</th><th>Recall</th><th>Accuracy</th><th>MAE</th><th>RMSE</th></tr></thead><tbody>';
            rankings.forEach((entry, i) => {
                const status = entry.complete_benchmark
                    ? '<span class="status-badge complete">Complete</span>'
                    : '<span class="status-badge partial">Partial</span>';
                html += '<tr>';
                html += '<td><strong>#' + (i+1) + '</strong></td>';
                html += '<td><div style="font-weight:600;">' + entry.model_name + '</div>';
                if (entry.description) html += '<div style="font-size:12px;color:#6b7280;">' + entry.description + '</div>';
                html += '</td>';
                html += '<td style="text-align:center;">' + entry.unique_datasets_count + '</td>';
                html += '<td style="text-align:center;">' + status + '</td>';
                html += '<td style="text-align:center;">' + fmt(entry.avg_quadratic_weighted_kappa) + '</td>';
                html += '<td style="text-align:center;">' + fmt(entry.avg_pearson_correlation) + '</td>';
                html += '<td style="text-align:center;">' + fmt(entry.avg_f1_score) + '</td>';
                html += '<td style="text-align:center;">' + fmt(entry.avg_precision) + '</td>';
                html += '<td style="text-align:center;">' + fmt(entry.avg_recall) + '</td>';
                html += '<td style="text-align:center;">' + fmt(entry.avg_accuracy) + '</td>';
                html += '<td style="text-align:center;">' + fmt(entry.avg_mean_absolute_error) + '</td>';
                html += '<td style="text-align:center;">' + fmt(entry.avg_root_mean_squared_error) + '</td>';
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            tableContainer.innerHTML = html;
        }
</script>
</body>
</html>
