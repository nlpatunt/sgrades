<VirtualHost *:80>
    # For localhost access
    ServerName localhost
    ServerAlias 127.0.0.1
    
    # Document root for macOS Homebrew Apache
    DocumentRoot /opt/homebrew/var/www/sgrades
    
    # Directory configuration
    <Directory "/opt/homebrew/var/www/sgrades">
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
        
        # Security headers
        Header always set X-Content-Type-Options nosniff
        Header always set X-Frame-Options DENY
        Header always set X-XSS-Protection "1; mode=block"
    </Directory>
    
    # API Proxy Configuration - Routes all API calls to FastAPI backend
    ProxyPreserveHost On
    ProxyRequests Off
    
    # Proxy API endpoints
    ProxyPass /api/ http://localhost:8000/api/
    ProxyPassReverse /api/ http://localhost:8000/api/
    
    # Proxy submissions endpoints
    ProxyPass /submissions/ http://localhost:8000/submissions/
    ProxyPassReverse /submissions/ http://localhost:8000/submissions/
    
    # Proxy docs endpoint (optional, for API documentation)
    ProxyPass /docs http://localhost:8000/docs
    ProxyPassReverse /docs http://localhost:8000/docs
    
    # Proxy OpenAPI JSON
    ProxyPass /openapi.json http://localhost:8000/openapi.json
    ProxyPassReverse /openapi.json http://localhost:8000/openapi.json
    
    # Static file optimization
    <LocationMatch "\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        ExpiresActive On
        ExpiresDefault "access plus 1 month"
        
        # Enable compression for these file types
        <IfModule mod_deflate.c>
            SetOutputFilter DEFLATE
        </IfModule>
    </LocationMatch>
    
    # Enable compression for HTML, CSS, JS
    <IfModule mod_deflate.c>
        <LocationMatch "\.(html|css|js|json)$">
            SetOutputFilter DEFLATE
        </LocationMatch>
    </IfModule>
    
    # Security: Hide Apache version
    ServerTokens Prod
    
    # Error and Access logs
    ErrorLog ${APACHE_LOG_DIR}/sgrades_error.log
    CustomLog ${APACHE_LOG_DIR}/sgrades_access.log combined
    LogLevel warn
    
    # Optional: Redirect root to main app
    RedirectMatch ^/$ /index.html
</VirtualHost>

# Optional HTTPS configuration (recommended for production)
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName localhost
    ServerAlias 127.0.0.1
    DocumentRoot /opt/homebrew/var/www/sgrades
    
    # SSL Configuration (update paths as needed)
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/sgrades.crt
    SSLCertificateKeyFile /etc/ssl/private/sgrades.key
    
    # Include all the same directory and proxy configurations as above
    <Directory "/opt/homebrew/var/www/sgrades">
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
        
        Header always set X-Content-Type-Options nosniff
        Header always set X-Frame-Options DENY
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    </Directory>
    
    ProxyPreserveHost On
    ProxyRequests Off
    
    ProxyPass /api/ http://localhost:8000/api/
    ProxyPassReverse /api/ http://localhost:8000/api/
    
    ProxyPass /submissions/ http://localhost:8000/submissions/
    ProxyPassReverse /submissions/ http://localhost:8000/submissions/
    
    ProxyPass /docs http://localhost:8000/docs
    ProxyPassReverse /docs http://localhost:8000/docs
    
    ProxyPass /openapi.json http://localhost:8000/openapi.json
    ProxyPassReverse /openapi.json http://localhost:8000/openapi.json
    
    <LocationMatch "\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        ExpiresActive On
        ExpiresDefault "access plus 1 month"
        <IfModule mod_deflate.c>
            SetOutputFilter DEFLATE
        </IfModule>
    </LocationMatch>
    
    <IfModule mod_deflate.c>
        <LocationMatch "\.(html|css|js|json)$">
            SetOutputFilter DEFLATE
        </LocationMatch>
    </IfModule>
    
    ErrorLog ${APACHE_LOG_DIR}/sgrades_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/sgrades_ssl_access.log combined
    
    RedirectMatch ^/$ /index.html
</VirtualHost>
</IfModule>